    <line x1="80" y1="80" x2="0" y2="0" stroke="#06b6d4" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-5" cy="85" r="10" fill="#a855f7" opacity="0.8"/>
    <circle cx="85" cy="85" r="10" fill="#06b6d4" opacity="0.8"/>
    <rect x="28" y="28" width="24" height="24" rx="4" transform="rotate(45 40 40)" fill="#a855f7" opacity="0.9"/>
    <rect x="33" y="33" width="14" height="14" rx="2" transform="rotate(45 40 40)" fill="#10b981"/>
  </g>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="monospace" font-size="72" font-weight="900" fill="white" letter-spacing="6">GAME</text>
