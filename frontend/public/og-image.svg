  <text x="648" y="290" text-anchor="middle" font-family="monospace" font-size="72" font-weight="900" fill="#a855f7">_</text>
  <text x="780" y="290" text-anchor="middle" font-family="monospace" font-size="72" font-weight="900" fill="white" letter-spacing="6">ARENA</text>

