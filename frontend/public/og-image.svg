<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#050505"/>
  <rect x="1" y="1" width="1198" height="628" stroke="#a855f7" stroke-width="1" stroke-opacity="0.15" fill="none"/>

  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.05"/>

  <!-- Crossed swords icon -->
  <g transform="translate(460, 120)">
