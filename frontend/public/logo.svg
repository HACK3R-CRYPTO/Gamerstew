<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="40" fill="#050505"/>
  <rect x="2" y="2" width="196" height="196" rx="38" stroke="#a855f7" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <!-- Crossed swords -->
  <line x1="60" y1="140" x2="140" y2="60" stroke="#a855f7" stroke-width="6" stroke-linecap="round"/>
  <line x1="140" y1="140" x2="60" y2="60" stroke="#06b6d4" stroke-width="6" stroke-linecap="round"/>
  <!-- Sword handles -->
  <circle cx="55" cy="145" r="8" fill="#a855f7" opacity="0.8"/>
  <circle cx="145" cy="145" r="8" fill="#06b6d4" opacity="0.8"/>
  <!-- Center diamond -->
  <rect x="88" y="88" width="24" height="24" rx="4" transform="rotate(45 100 100)" fill="#a855f7" opacity="0.9"/>
  <rect x="93" y="93" width="14" height="14" rx="2" transform="rotate(45 100 100)" fill="#10b981"/>
  <!-- G$ symbol -->
  <text x="100" y="178" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#f59e0b" opacity="0.7">G$</text>
</svg>
